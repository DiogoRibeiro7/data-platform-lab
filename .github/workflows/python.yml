name: Python

on:
  push:
    paths:
      - "python/**"
      - "data/sample/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - "data/sample/**"
      - ".github/workflows/python.yml"

defaults:
  run:
    working-directory: python

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest

      - name: Demo smoke test
        run: poetry run python -m data_platform_lab.demo --data-dir ../data/sample --output-dir /tmp/silver --manifest-dir /tmp/manifests
