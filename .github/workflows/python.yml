name: Python

on:
  push:
    paths:
      - "python/**"
      - "data/sample/**"
      - "sql/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - "data/sample/**"
      - "sql/**"
      - ".github/workflows/python.yml"

defaults:
  run:
    working-directory: python

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: python/.venv
          key: py-venv-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: py-venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy strict type-check
        run: poetry run mypy src/

  test:
    name: Test & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: python/.venv
          key: py-venv-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: py-venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest

      - name: "Smoke: e-commerce demo"
        run: poetry run python -m data_platform_lab.demo --data-dir ../data/sample --output-dir /tmp/demo/silver --manifest-dir /tmp/demo/manifests

      - name: "Smoke: sensor demo"
        run: poetry run python -m data_platform_lab.sensor_demo --data-dir ../data/sample --output-dir /tmp/sensor/silver --manifest-dir /tmp/sensor/manifests
