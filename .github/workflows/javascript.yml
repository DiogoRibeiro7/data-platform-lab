name: JavaScript

on:
  push:
    paths:
      - "javascript/**"
      - "data/sample/**"
      - "sql/**"
      - ".github/workflows/javascript.yml"
  pull_request:
    paths:
      - "javascript/**"
      - "data/sample/**"
      - "sql/**"
      - ".github/workflows/javascript.yml"

defaults:
  run:
    working-directory: javascript

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: javascript/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('javascript/package.json') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable || yarn install

      - name: ESLint
        run: yarn lint

  test:
    name: Test & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: javascript/.yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('javascript/package.json') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable || yarn install

      - name: Run tests
        run: yarn test

      - name: "Smoke: e-commerce demo"
        run: node src/demo.js --data-dir ../data/sample --output-dir /tmp/demo/silver --manifest-dir /tmp/demo/manifests

      - name: "Smoke: sensor demo"
        run: node src/sensor-demo.js --data-dir ../data/sample --output-dir /tmp/sensor/silver --manifest-dir /tmp/sensor/manifests
